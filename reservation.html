<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation - Café de Barista</title>
    <link rel="stylesheet" href="reservation.css">
</head>
<body>
    <header class="reservation-header">
        <h1>Reserve Your Table</h1>
    </header>

    <section class="reservation-form">
        <h2>Book a Table</h2>
        <form action="#" method="POST">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" required>

            <label for="date">Date:</label>
            <input type="date" id="date" name="date" required>

            <label for="time">Time:</label>
            <input type="time" id="time" name="time" required>

            <label for="guests">Number of Guests:</label>
            <input type="number" id="guests" name="guests" min="1" required>

            <label for="special">Special Requests:</label>
            <textarea id="special" name="special" rows="4"></textarea>

            <button type="submit">Reserve Now</button>
        </form>
    </section>

    <footer class="reservation-footer">
        <p>&copy; 2025 Café de Barista. All Rights Reserved.</p>
    </footer>
</body>
</html>
